<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PESSOAS - CRUD</title>

    <link rel="stylesheet" href="css/style_pessoas.css">
    <script src="js/javascript_pessoas.js" defer></script>

</head>

   

<body>
    <div id="div-regras"></div>
        <p>Pessoas com renda menor ou igual a R$1.700,00 - 
            Isentas de Desconto
        </p>
        <p>De R$1.701,00 Até R$5000,00 - Desconoto de 5%</p>
        <p>De R$5001,00 Até R$8000,00 - Desconoto de 10%</p>
        <p>De R$8001,00 Até R$12000,00 - Desconoto de 15%</p>
        <p>Acima de R$12000,00 - Desconoto de 20%</p>

    <div id="geral">

        <h3>Cadastro Aluno</h3>

        <div id="div-form-pessoa">

            <form id="form-pessoa">
                <label for="nome">NOME</label>
                <input type="text" name="nome" id="nome">

                <label for="idade">IDADE</label>
                <input type="text" name="idade" id="idade">

                <label for="renda">RENDA</label>
                <input type="text" name="renda" id="renda">

               <button type="submit" id="btn-add">Adicionar</button>
               <button type="reset" id="btn-limpar">Limpar</button>

            </form>
        </div>

        <div id="div-lista-pessoas">

        </div>

    </div>
    
</body>
</html>
